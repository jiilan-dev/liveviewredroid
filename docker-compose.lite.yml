services:
  redroid:
    # Override mode hemat resource untuk VPS tanpa GPU.
    command:
      - androidboot.redroid_width=360
      - androidboot.redroid_height=640
      - androidboot.redroid_dpi=160
      - androidboot.redroid_fps=12
      - androidboot.redroid_gpu_mode=guest
    cpus: 0.75
    mem_limit: 900m
    memswap_limit: 900m
    pids_limit: 256
